# GamesDownloader — ClamAV freshclam configuration
# Virus database is stored in /data/clamav (Docker volume) so definitions
# survive container rebuilds.

# Same directory as clamd
DatabaseDirectory /data/clamav

# Log to stdout only — no file needed in Docker (avoids /var/log/clamav permission issues)
# UpdateLogFile is intentionally absent; output goes to the process stdout
LogTime yes

# Official ClamAV update mirror (required)
DatabaseMirror database.clamav.net

# Download settings / retries
MaxAttempts 5
ConnectTimeout 30
ReceiveTimeout 60

# Scheduled auto-update checks per day (0 = disabled here; GD manages updates)
Checks 0
