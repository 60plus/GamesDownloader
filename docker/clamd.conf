# GamesDownloader — ClamAV daemon configuration
# Compatible with ClamAV 0.103+ (ScanArchives and several other options
# were removed in 0.103 — archive scanning is now always enabled).

# Virus database directory (mounted as Docker volume)
DatabaseDirectory /data/clamav

# Unix socket — mode 666 so non-root uvicorn workers can connect
LocalSocket /tmp/clamd.sock
LocalSocketMode 666

# Run as root inside the container
User root

# Stay in foreground — do NOT fork/daemonize.
# Required so asyncio.create_subprocess_exec can monitor the process correctly.
# Without this, clamd forks and the parent exits with code 0, which our startup
# code incorrectly interprets as a crash.
Foreground yes

# Log to stdout only (no file — avoids /var/log/clamav permission issues)
LogTime yes

# Allow large game archives / installers (0 = unlimited)
MaxScanSize 0
MaxFileSize 0

# Safety — never follow symlinks out of scanned tree
FollowDirectorySymlinks no
FollowFileSymlinks no

MaxDirectoryRecursion 20

# Keep daemon alive between scans
IdleTimeout 3600
